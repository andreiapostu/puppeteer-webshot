version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Rome"

    commit-message:
      prefix: "chore(deps)"

    reviewers:
      - "andreiapostu"

    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      
      prod-dependencies-safe:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
